services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-hedge-fund-api
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - ./:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ./qdrant_data:/qdrant/storage
configs:
  qdrant_config:
    content: |
      log_level: INFO

  
